services:
  nginx:
      image: nginx:alpine-slim
      container_name: nginx
      restart: unless-stopped
      ports:
        - "80:80"
      volumes:
        - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
        - ./config/templates:/etc/nginx/templates:ro
        - /etc/letsencrypt:/etc/letsencrypt:ro
      env_file:
        - .env
      network_mode: bridge
